<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayuda - SlotMaster</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #ffffff;
            line-height: 1.6;
        }
        h1, h2 {
            color: #f5c542;
        }
        .card {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<h1>Ayuda de SlotMaster</h1>

<div class="card">
    <h2>Objetivo del juego</h2>
    <p>Completar la partida correctamente y conseguir la victoria.</p>
</div>

<div class="card">
    <h2>Cómo jugar</h2>
    <ul>
        <li>Inicia una partida desde el menú principal.</li>
        <li>Interactúa con las fichas o elementos del juego.</li>
        <li>Intenta ganar en el menor número de movimientos posible.</li>
    </ul>
</div>
</body>
</html>
